<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Falconbets</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

header {
  background:#121a2b;
  padding:15px;
  text-align:center;
  font-size:24px;
  color:gold;
}

.banner {
  text-align:center;
  padding:40px;
  background:linear-gradient(135deg,#0b0f1a,#1d2a44);
}

input {
  padding:10px;
  margin:10px;
}

button {
  background:gold;
  border:none;
  padding:10px 20px;
  cursor:pointer;
}

.game {
  background:#121a2b;
  margin:10px;
  padding:15px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<header>🦅 FALCONBETS</header>

<div class="banner">
  <input id="user" placeholder="Seu nome">
  <button onclick="login()">Entrar</button>
</div>

<h2 style="text-align:center">Jogos ⚽</h2>
<div id="games"></div>

<script>
const API = "https://falconbets-pro.onrender.com";

async function loadGames(){
  const res = await fetch(API+"/games");
  const games = await res.json();

  let html="";
  games.forEach(g=>{
    html+=`
      <div class="game">
        ${g.home} x ${g.away}
        <button onclick="bet(${g.id})">
          Odd ${g.odd}
        </button>
      </div>
    `;
  });

  document.getElementById("games").innerHTML = html;
}

function login(){
  const user=document.getElementById("user").value;

  fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:user})
  });

  alert("Entrou!");
}

function bet(id){
  const user=document.getElementById("user").value;

  fetch(API+"/bet",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:user,
      gameId:id,
      amount:10
    })
  });

  alert("Aposta feita!");
}

loadGames();
</script>

</body>
</html>
