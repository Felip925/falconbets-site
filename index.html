<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Falconbets</title>

<style>
body {margin:0;font-family:Arial;background:#0b0f1a;color:white}

header {
  background:#121a2b;
  padding:15px;
  display:flex;
  justify-content:space-between;
  color:gold;
}

.banner {text-align:center;padding:40px}

input, textarea {
  padding:10px;
  margin:10px;
  border:none;
  border-radius:5px;
  width:80%;
}

button {
  background:gold;
  border:none;
  padding:10px;
  border-radius:5px;
  cursor:pointer;
}

.game {
  background:#1a2338;
  margin:10px;
  padding:15px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

.container {padding:20px}

.admin {
  position:fixed;
  bottom:10px;
  right:10px;
  background:#111;
  padding:15px;
  border-radius:10px;
  display:none;
  width:300px;
}
</style>
</head>

<body>

<header>
  🦅 FALCONBETS
  <div>Saldo: R$ <span id="saldo">0</span></div>
</header>

<div class="banner">
  <input id="user" placeholder="Usuário">
  <button onclick="login()">Entrar</button>
</div>

<div class="container">
  <h2>Jogos ⚽</h2>
  <div id="games"></div>
</div>

<!-- ADMIN -->
<div class="admin" id="admin">
  <h3>👑 ADMIN</h3>

  <input id="userAdmin" placeholder="Usuário">
  <input id="valor" placeholder="Valor">
  <button onclick="addSaldo()">Adicionar saldo</button>

  <hr>

  <h4>⚽ Atualizar Jogos</h4>

  <textarea id="gamesAdmin" rows="8" placeholder="Cole os jogos aqui"></textarea>

  <button onclick="updateGames()">Atualizar jogos</button>
</div>

<script>
const API = "https://falconbets-pro.onrender.com";

let usuario="";
let saldo=0;

// LOGIN
async function login(){
  usuario=document.getElementById("user").value;

  await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:usuario})
  });

  saldo=100;
  atualizarSaldo();
  loadGames();

  if(usuario === "admin"){
    document.getElementById("admin").style.display="block";
  }
}

// SALDO
function atualizarSaldo(){
  document.getElementById("saldo").innerText=saldo;
}

// CARREGAR JOGOS
async function loadGames(){
  try{
    const res = await fetch(API + "/games");
    const games = await res.json();

    let html="";

    games.forEach(g=>{
      html+=`
        <div class="game">
          <div>
            <b>${g.league}</b><br>
            ${g.home} x ${g.away}<br>
            🕒 ${g.time}
          </div>

          <button onclick="bet(${g.id}, ${g.odd})">
            Odd ${g.odd}
          </button>
        </div>
      `;
    });

    document.getElementById("games").innerHTML = html;

  }catch(e){
    console.log("Erro:", e);
  }
}

// APOSTA
async function bet(id, odd){
  if(!usuario) return alert("Faça login");

  if(saldo < 10) return alert("Saldo insuficiente");

  saldo -= 10;
  atualizarSaldo();

  await fetch(API+"/bet",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:usuario,
      gameId:id,
      amount:10
    })
  });

  alert("Aposta realizada!");
}

// ATUALIZAR JOGOS
async function updateGames(){
  const texto = document.getElementById("gamesAdmin").value;

  try{
    const games = JSON.parse(texto);

    await fetch(API + "/admin/games", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ games })
    });

    alert("Jogos atualizados!");
    loadGames();

  }catch(e){
    alert("Erro no formato JSON");
  }
}

// ADMIN SALDO
function addSaldo(){
  const user=document.getElementById("userAdmin").value;
  const valor=parseFloat(document.getElementById("valor").value);

  if(user === usuario){
    saldo += valor;
    atualizarSaldo();
  }
}

// AUTO LOAD
window.onload = loadGames;
</script>

</body>
</html>
