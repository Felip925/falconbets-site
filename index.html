<script>
const API = "https://falconbets-pro.onrender.com";

let usuario="";
let saldo=0;

// LOGIN
async function login(){
  usuario=document.getElementById("user").value;

  await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:usuario})
  });

  saldo=100;
  atualizarSaldo();
  loadGames();

  if(usuario === "admin"){
    document.getElementById("admin").style.display="block";
  }
}

// SALDO
function atualizarSaldo(){
  document.getElementById("saldo").innerText=saldo;
}

// CARREGAR JOGOS
async function loadGames(){
  try{
    const res = await fetch(API + "/games");
    const games = await res.json();

    let html="";
    games.forEach(g=>{
      html+=`
        <div class="game">
          <div>
            <b>${g.league}</b><br>
            ${g.home} x ${g.away}<br>
            🕒 ${g.time}
          </div>

          <button onclick="bet(${g.id}, ${g.odd})">
            Odd ${g.odd}
          </button>
        </div>
      `;
    });

    document.getElementById("games").innerHTML = html;

  }catch(e){
    console.log("Erro:", e);
  }
}

// APOSTA
async function bet(id, odd){
  if(!usuario) return alert("Faça login");

  if(saldo < 10) return alert("Saldo insuficiente");

  saldo -= 10;
  atualizarSaldo();

  await fetch(API+"/bet",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:usuario,
      gameId:id,
      amount:10
    })
  });

  alert("Aposta realizada!");
}

// 🔥 ATUALIZAR JOGOS (ADMIN)
async function updateGames(){
  const texto = document.getElementById("gamesAdmin").value;

  try{
    const games = JSON.parse(texto);

    await fetch(API + "/admin/games", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ games })
    });

    alert("Jogos atualizados!");
    loadGames();

  }catch(e){
    alert("Erro no formato JSON");
  }
}

// ADMIN SALDO
function addSaldo(){
  const user=document.getElementById("userAdmin").value;
  const valor=parseFloat(document.getElementById("valor").value);

  if(user === usuario){
    saldo += valor;
    atualizarSaldo();
  }
}

// AUTO LOAD
window.onload = loadGames;
</script>
