<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Falconbets</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

header {
  background:#121a2b;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:gold;
}

.logo {
  font-size:22px;
  font-weight:bold;
}

.banner {
  text-align:center;
  padding:50px;
  background:linear-gradient(135deg,#0b0f1a,#1d2a44);
}

input {
  padding:10px;
  margin:10px;
  border-radius:5px;
  border:none;
}

button {
  background:gold;
  border:none;
  padding:10px 20px;
  border-radius:5px;
  cursor:pointer;
  font-weight:bold;
}

.container {
  padding:20px;
}

.game {
  background:#1a2338;
  margin:10px 0;
  padding:15px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}

.game:hover {
  transform:scale(1.02);
}

footer {
  text-align:center;
  padding:20px;
  background:#121a2b;
  margin-top:20px;
}
</style>
</head>

<body>

<header>
  <div class="logo">🦅 FALCONBETS</div>
</header>

<div class="banner">
  <h1>Aposte como um profissional ⚽</h1>
  <input id="user" placeholder="Digite seu nome">
  <button onclick="login()">Entrar</button>
</div>

<div class="container">
  <h2>🔥 Jogos de Hoje</h2>
  <div id="games"></div>
</div>

<footer>
© 2026 Falconbets
</footer>

<script>
const API = "https://falconbets-pro.onrender.com";

async function loadGames(){
  const res = await fetch(API+"/games");
  const games = await res.json();

  let html="";
  games.forEach(g=>{
    html+=`
      <div class="game">
        <span>${g.home} x ${g.away}</span>
        <button onclick="bet(${g.id})">
          Odd ${g.odd}
        </button>
      </div>
    `;
  });

  document.getElementById("games").innerHTML = html;
}

function login(){
  const user=document.getElementById("user").value;

  fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:user})
  });

  alert("Entrou!");
}

function bet(id){
  const user=document.getElementById("user").value;

  fetch(API+"/bet",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:user,
      gameId:id,
      amount:10
    })
  });

  alert("Aposta realizada!");
}

loadGames();
</script>

</body>
</html>
